name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag and manifest version
        shell: python
        run: |
          import json
          import os

          tag = os.environ["GITHUB_REF_NAME"]
          with open("custom_components/datakom/manifest.json", encoding="utf-8") as file:
              version = json.load(file)["version"]

          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Release tag {tag!r} does not match manifest version {expected!r}"
              )

      - name: Build HACS archive
        run: |
          cd custom_components/datakom
          zip -r ../../datakom.zip . -x "*/__pycache__/*" "*.pyc"

      - name: Validate HACS archive
        run: |
          test -s datakom.zip
          unzip -t datakom.zip
          unzip -l datakom.zip | grep -q "manifest.json"
          unzip -l datakom.zip | grep -q "__init__.py"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: datakom.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
