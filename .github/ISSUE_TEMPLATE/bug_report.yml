name: Bug report
description: Report a reproducible problem with the integration
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove credentials, tokens and private network details from all logs.
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: 0.10.6
    validations:
      required: true
  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.7.0
    validations:
      required: true
  - type: input
    id: controller
    attributes:
      label: Controller model and firmware
      placeholder: Datakom D502, hardware 6, firmware 8.7
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: Explain what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Press...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only redacted logs relevant to this issue.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I am using the latest published integration version.
          required: true
        - label: I removed passwords, tokens and private network details.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
